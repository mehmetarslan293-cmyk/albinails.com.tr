# Secrets: SSH_HOST, SSH_USER, SSH_KEY (Repository secrets - Actions)
#
# SSH_KEY = PRIVATE key (tam metin):
#   -----BEGIN OPENSSH PRIVATE KEY-----  veya  -----BEGIN RSA PRIVATE KEY-----
#   ... orta satirlar ...
#   -----END ...-----
# Hata "ssh: no key found" -> Secret bos, public key yapisti, veya satirlar kopuk.
# Olusturma: ssh-keygen -t ed25519 -f github_actions -N ""
# Public -> sunucu ~/.ssh/authorized_keys | Private -> GitHub SSH_KEY secret
#
# Deploy key (repo Settings > Deploy keys) BURADA KULLANILMAZ; o sunucunun git pull icin GitHub'a gitmesi icindir.
# Port 22 degilse asagidaki port satirini guncelleyin.

name: Sunucuya Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH ile baglan ve guncelle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            echo "==> Dizin: /var/www/albinails"
            test -d /var/www/albinails || { echo "HATA: /var/www/albinails yok (sunucuda olusturun + git clone)."; exit 1; }
            cd /var/www/albinails
            git config --global --add safe.directory /var/www/albinails 2>/dev/null || true
            echo "==> git pull"
            git pull origin main
            echo "==> Tamam"
