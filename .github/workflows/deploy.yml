# Secrets: SSH_HOST, SSH_USER, SSH_KEY (Repository > Secrets and variables > Actions)
# SSH_KEY = tam PRIVATE key metni (-----BEGIN ... PRIVATE KEY----- ile baslar)
#
# SSH_PORT (opsiyonel): bos birakirsaniz 22 kullanilir. Ornek: 2222

name: Sunucuya Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH anahtarini dosyaya yaz (multiline secret sorunlarini onler)
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -e
          if [ -z "$SSH_KEY" ]; then
            echo "::error::SSH_KEY secret tanimli degil veya bos. Settings > Secrets > Actions > New repository secret > adi tam olarak SSH_KEY olmali."
            exit 1
          fi
          case "$SSH_KEY" in *BEGIN*PRIVATE*KEY*) ;; *)
            echo "::error::SSH_KEY bir private key gibi degil. ssh-ed25519 AAAA... ile baslayan PUBLIC key degil; dosya -----BEGIN OPENSSH PRIVATE KEY----- ile baslamali."
            exit 1
            ;;
          esac
          printf '%s\n' "$SSH_KEY" > "$GITHUB_WORKSPACE/.deploy_ssh_key"
          chmod 600 "$GITHUB_WORKSPACE/.deploy_ssh_key"
          echo "Private key dosyaya yazildi (uzunluk: $(wc -c < "$GITHUB_WORKSPACE/.deploy_ssh_key") bayt)."

      - name: SSH ile baglan ve guncelle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: .deploy_ssh_key
          port: ${{ secrets.SSH_PORT && secrets.SSH_PORT || 22 }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            echo "==> Dizin: /var/www/albinails"
            test -d /var/www/albinails || { echo "HATA: /var/www/albinails yok (sunucuda olusturun + git clone)."; exit 1; }
            cd /var/www/albinails
            git config --global --add safe.directory /var/www/albinails 2>/dev/null || true
            echo "==> git pull"
            git pull origin main
            echo "==> Tamam"
