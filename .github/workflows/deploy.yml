# Gerekli GitHub Secrets: SSH_HOST, SSH_USER, SSH_KEY
# SSH_KEY = sunucuya normal giris icin PRIVATE key (authorized_keys'teki ciftin kisa parcasi)
# Bu, "Deploy key" (GitHub'dan repoya cekmek) ile farklidir.
# Port 22 disiysa asagidaki "port" satirini 2222 gibi guncelleyin.

name: Sunucuya Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH ile baglan ve guncelle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            echo "==> Dizin: /var/www/albinails"
            test -d /var/www/albinails || { echo "HATA: /var/www/albinails yok (sunucuda olusturun + git clone)."; exit 1; }
            cd /var/www/albinails
            git config --global --add safe.directory /var/www/albinails 2>/dev/null || true
            echo "==> git pull"
            git pull origin main
            echo "==> Tamam"
